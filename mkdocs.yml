site_name: batchcorder
site_description: Replayable Arrow record-batch streams with hybrid memory/disk caching
repo_url: https://github.com/yourorg/multirecord
repo_name: yourorg/multirecord
docs_dir: docs

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.integrate
    - content.code.copy
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - autorefs:
      resolve_closest: true
  - mkdocstrings:
      handlers:
        python:
          paths: [python]
          options:
            allow_inspection: false   # static analysis only — no compiled extension needed
            show_source: false        # source is Rust; not useful to show
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            docstring_style: numpy
            merge_init_into_class: false
            signature_crossrefs: true
            find_stubs_package: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Tutorial:
      - Getting Started: tutorial/getting-started.md
  - How-to Guides:
      - Use with DuckDB: how-to/duckdb.md
      - Configure cache size: how-to/cache-config.md
      - Handle eviction errors: how-to/eviction.md
  - Reference:
      - API: reference/cached-dataset.md
  - Explanation:
      - Architecture: explanation/architecture.md
      - GIL & locking design: explanation/gil-deadlock.md
      - Disk-spill testing: explanation/disk-spill-testing.md
