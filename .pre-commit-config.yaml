default_language_version:
  python: python3

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: name-tests-test
        args: ["--pytest-test-first"]

  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.25
    hooks:
      - id: validate-pyproject

  # typos: fast, code-aware typo checker (understands identifiers/tokens)
  - repo: https://github.com/adhtruong/mirrors-typos
    rev: v1.44.0
    hooks:
      - id: typos
        args: ["--config", "pyproject.toml"]

  # codespell: natural-language spell checker for comments and docs
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        args: [--toml, "pyproject.toml"]
        additional_dependencies:
          - tomli

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff-check
        args: ["--output-format=full", "--fix"]
      - id: ruff-format

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.11
    hooks:
      - id: actionlint

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.10.10
    hooks:
      - id: uv-lock

  - repo: https://github.com/ComPWA/taplo-pre-commit
    rev: v0.9.3
    hooks:
      - id: taplo-format

  - repo: local
    hooks:
      - id: rust-fmt
        name: Rust fmt
        description: Run cargo fmt on files included in the commit.
        entry: cargo +nightly fmt --all --
        language: system
        pass_filenames: true
        types: [file, rust]

      - id: rust-clippy
        name: Rust clippy
        description: Run cargo clippy — deny all warnings.
        entry: cargo clippy --all-targets --all-features -- -Dclippy::all -D warnings -Aclippy::redundant_closure
        language: system
        pass_filenames: false
        types: [file, rust]

      - id: cargo-doc
        name: cargo doc
        description: Verify Rust doc-comments compile and intra-doc links resolve.
        entry: env RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --document-private-items
        language: system
        pass_filenames: false
        types: [rust]

      - id: pyright
        name: pyright
        description: Static type-checking for Python code and stubs.
        entry: .venv/bin/pyright
        language: system
        pass_filenames: false
        types_or: [python, pyi]

      # griffe validates that NumPy-style docstrings match function signatures.
      # Dynamically imports the installed batchcorder extension.
      - id: griffe
        name: griffe (docstring validation)
        description: Validate NumPy-style docstrings are complete and consistent.
        entry: .venv/bin/griffe dump -d numpy -LWARNING -o /dev/null batchcorder
        language: system
        pass_filenames: false
        types_or: [python, pyi]

      # mypy.stubtest imports the compiled extension and checks that every
      # name, arity, and type annotation in batchcorder.pyi matches runtime.
      # Requires: maturin develop --uv  (compiled .so must be present)
      - id: mypy-stubtest
        name: mypy stubtest
        description: Validate batchcorder.pyi matches the compiled extension at runtime.
        entry: .venv/bin/python -m mypy.stubtest batchcorder
        language: system
        pass_filenames: false
        types_or: [python, pyi]
