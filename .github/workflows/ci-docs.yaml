name: Docs

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install docs dependencies
        run: uv pip install --system -r docs/requirements.txt

      - name: Build docs
        run: mkdocs build --strict
